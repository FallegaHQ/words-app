name: Android Debug Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm packages
        run: npm install

      - name: Build Vite web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons
        run: |
          pip install pillow --quiet
          python scripts/generate-icons.py

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platforms and build tools
        run: |
          sdkmanager \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Generate release version
        id: version
        run: echo "tag=v$(date -u +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             words-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Build ${{ steps.version.outputs.tag }}"
          body: |
            Automated debug build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: words-${{ steps.version.outputs.tag }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}